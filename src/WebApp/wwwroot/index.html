<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WebApp</title>
    <base href="/" />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="WebApp.styles.css" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
</head>

<body>
  <div id="app">Loading...</div>

  <div id="blazor-error-ui">
    An unhandled error has occurred.
    <a href="" class="reload">Reload</a>
    <a class="dismiss">🗙</a>
  </div>
  <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
  <script>
    window.auth0Interop = {
      clearOidcClientState: function () {
        try {
          const prefixes = ["oidc.", "Microsoft.AspNetCore.Components.WebAssembly.Authentication"];

          const removeMatchingKeys = (storage) => {
            if (!storage) return;

            for (let i = storage.length - 1; i >= 0; i--) {
              const key = storage.key(i);
              if (!key) continue;
              if (prefixes.some(prefix => key.startsWith(prefix))) {
                storage.removeItem(key);
              }
            }
          };

          removeMatchingKeys(window.sessionStorage);
          removeMatchingKeys(window.localStorage);
        } catch (e) {
          // Ignore cleanup failures; logout redirect should continue.
        }
      },
      logout: function (authority, clientId, returnTo) {
        window.auth0Interop.clearOidcClientState();
        const url = authority + "/v2/logout?client_id=" + encodeURIComponent(clientId)
          + "&returnTo=" + encodeURIComponent(returnTo);
        window.location.replace(url);
      }
    };
  </script>
  <script src="_framework/blazor.webassembly.js"></script>
  <script>navigator.serviceWorker.register('service-worker.js');</script>
</body>

</html>
